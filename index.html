/* ===================== STORAGE HELPERS ===================== */
const DEFAULT_CERT = {teacherName:"Mrs. Mona Mohamed",schoolName:"Qatr Al Nada Secondary School for Girls",principalName:"Mrs. Ashwaq Almansouri",title:"Certificate of Achievement",message:"For outstanding effort and progress in End of Term 3 English revision."};
async function sGet(key, shared){ try{ const r = await window.storage.get(key, !!shared); return r ? JSON.parse(r.value) : null; }catch(e){ return null; } }
async function sSet(key, val, shared){ try{ await window.storage.set(key, JSON.stringify(val), !!shared); }catch(e){} }

async function loadCustomVocab(grade){ return (await sGet('customVocab:'+grade, true)) || []; }
async function loadCustomVocabQuiz(grade){ return (await sGet('customVocabQuiz:'+grade, true)) || []; }
async function loadCustomGrammar(grade){ return (await sGet('customGrammar:'+grade, true)) || []; }
async function loadCustomReading(grade){ return (await sGet('customReading:'+grade, true)) || []; }
async function loadCertSettings(){ return (await sGet('certSettings', true)) || DEFAULT_CERT; }
async function loadReports(){ return (await sGet('reports', true)) || []; }
async function loadSheetWebhook(){ return (await sGet('sheetWebhookUrl', true)) || ''; }
async function pushReport(r){
  const list = await loadReports(); list.push(r); await sSet('reports', list, true);
  const url = await loadSheetWebhook();
  if(url){
    try{
      await fetch(url, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(r)
      });
    }catch(e){ /* network issue — report still saved above, just not forwarded */ }
  }
}

let mergedCache = {};
async function getMerged(gradeKey){
  if(mergedCache[gradeKey]) return mergedCache[gradeKey];
  const base = GRADES[gradeKey];
  const [cv, cvq, cg, cr] = await Promise.all([
    loadCustomVocab(gradeKey), loadCustomVocabQuiz(gradeKey), loadCustomGrammar(gradeKey), loadCustomReading(gradeKey)
  ]);
  const merged = {
    label: base.label, level: base.level,
    vocab: base.vocab.concat(cv),
    vocabQuiz: base.vocabQuiz.concat(cvq),
    grammar: cg.length ? base.grammar.concat([{code:'Teacher Added',title:'Teacher-Added Practice',explain:'Extra questions added by your teacher.',formula:'',examples:[],tip:'',warn:'',exercises:cg}]) : base.grammar,
    reading: base.reading.concat(cr)
  };
  mergedCache[gradeKey] = merged;
  return merged;
}
function invalidateCache(gradeKey){ delete mergedCache[gradeKey]; }

let studentName = '';
async function ensureStudentName(){
  if(studentName) return studentName;
  const saved = await sGet('studentName', false);
  if(saved){ studentName = saved; return studentName; }
  const entered = prompt("Enter your name (this will appear on your reports and certificate):");
  studentName = (entered||'').trim() || 'Student';
  await sSet('studentName', studentName, false);
  return studentName;
}

let curGrade = 'g9adv', curSection = 'vocab';

  gb.innerHTML = Object.entries(GRADES).map(([k,g])=>

/* ===================== SPEECH ===================== */
function speak(text){
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ===================== VOCABULARY (flashcards) ===================== */
let vIdx = 0, vShowHint = false, curMerged = null;
function renderVocabList(data){
  curMerged = data;
  vIdx = 0; vShowHint = false;
  renderFlashcard(data);
}
function renderFlashcard(data){
  const list = data.vocab;
  const item = list[vIdx];
  const main = document.getElementById('main');
  main.innerHTML = `
    <h2 class="section">📖 Vocabulary — ${data.label}</h2>
    <div class="card flashcard">
      <div class="counter">Word ${vIdx+1} of ${list.length}</div>
      <div class="word">${item.w}</div>
      <div class="row" style="justify-content:center;margin-top:10px;">
        <button class="btn sm gold" onclick="speak('${item.w.replace(/'/g,"\\'")}')">🔊 Hear word</button>
        <button class="btn sm ghost" onclick="speak('${item.s.replace(/'/g,"\\'")}')">🔊 Hear sentence</button>
      </div>
      <div class="sentence">"${item.s}"</div>
      <div class="row" style="justify-content:center;">
        <button class="btn sm" onclick="toggleHint()">🇦🇪 ${vShowHint?'Hide':'Show'} Arabic hint</button>
      </div>
      <div class="ar">${vShowHint ? item.ar : ''}</div>
      <div class="navrow">
        <button class="btn ghost" ${vIdx===0?'disabled':''} onclick="vNav(-1)">← Previous</button>
        <button class="btn ghost" ${vIdx===list.length-1?'disabled':''} onclick="vNav(1)">Next →</button>
      </div>
    </div>
    <div style="text-align:center;">
      <button class="btn gold" onclick="startVocabQuiz()">📝 Start Vocabulary Practice Quiz</button>
    </div>
  `;
}
function toggleHint(){ vShowHint = !vShowHint; renderFlashcard(curMerged); }
function vNav(d){ vIdx += d; vShowHint = false; renderFlashcard(curMerged); }
async function startVocabQuiz(){
  await ensureStudentName();
  runQuiz(curMerged.vocabQuiz, "Vocabulary Practice Quiz", null, ()=>renderVocabList(curMerged), 'Vocabulary');
}

/* ===================== GENERIC QUIZ ENGINE ===================== */
function runQuiz(questions, title, container, onFinish, sectionLabel){
  let idx = 0, score = 0;
  const target = container || document.getElementById('main');
  function showQ(){
    if(idx >= questions.length){ showResult(); return; }
    const q = questions[idx];
    const opts = q.opts.map(o=>`<button class="opt" onclick="quizSelect(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
    target.innerHTML = (container?'':`<h2 class="section">${title}</h2>`) + `
      <div class="card">
        <div class="qhead">Question ${idx+1} of ${questions.length}</div>
        <div class="qtext">${q.q}</div>
        <div id="optsWrap">${opts}</div>
        <div id="fbWrap"></div>
      </div>`;
    window._curQ = q;
  }
  window.quizSelect = function(btn, chosen){
    const q = window._curQ;
    const buttons = document.querySelectorAll('#optsWrap .opt');
    buttons.forEach(b=>{ b.disabled=true; if(b.textContent.trim()===q.correct) b.classList.add('correctOpt'); });
    const correct = chosen === q.correct;
    if(correct) score++; else btn.classList.add('wrongOpt');
    document.getElementById('fbWrap').innerHTML = `
      <div class="fb" style="color:${correct?'#2e7d32':'#c62828'};">${correct?'✅ Correct!':'❌ Not quite — correct answer highlighted above.'}</div>
      <button class="btn" style="margin-top:8px;" onclick="quizNext()">${idx+1<questions.length?'Next →':'See Results →'}</button>`;
  };
  window.quizNext = function(){ idx++; showQ(); };
  async function showResult(){
    const pct = Math.round((score/questions.length)*100);
    await pushReport({student:studentName, grade:curMerged.label, section:sectionLabel||'', topic:title, score, total:questions.length, pct, date:new Date().toISOString()});
    window._quizOnFinish = onFinish;
    window._lastResult = {score, total:questions.length, pct, title};
    target.innerHTML = (container?'':`<h2 class="section">${title} — Results</h2>`) + `
      <div class="score-banner">
        <div class="big">${score} / ${questions.length}</div>
        <div>${pct}%</div>
      </div>
      <div style="text-align:center;margin-top:14px;">
        <button class="btn gold" onclick="window._quizOnFinish()">← Back</button>
        <button class="btn ghost" onclick="showCertificate()">🖨️ Print Certificate</button>
      </div>`;
  }
  showQ();
}

async function showCertificate(){
  const cs = await loadCertSettings();

  document.getElementById('main').innerHTML = `

      <h2>${cs.title}</h2>
      <p>This certifies that</p>
      <div class="name">${studentName}</div>
      <p>has completed <strong>${curMerged?curMerged.label:''}</strong> revision — ${res.title}<br>Score: ${res.score}/${res.total} (${res.pct}%)</p>
      <p style="font-size:.85rem;">${cs.message}</p>

function refreshPassageOptions(){
  return (async ()=>{

    document.getElementById('rqPassage').innerHTML = all.map((p,i)=>`<option value="${i}" data-type="${p.type}">${p.title}</option>`).join('');
  })();
}

async function addVocabWord(){
  const grade = document.getElementById('vwGrade').value;
  const w = document.getElementById('vwWord').value.trim();
  const ar = document.getElementById('vwAr').value.trim();
  const s = document.getElementById('vwSentence').value.trim();
  const msg = document.getElementById('vwMsg');
  if(!w || !s){ msg.style.color='#c62828'; msg.textContent='Please fill in at least the word and an example sentence.'; return; }
  const list = await loadCustomVocab(grade); list.push({w,ar,s}); await sSet('customVocab:'+grade, list, true);
  invalidateCache(grade);
  msg.style.color='#2e7d32'; msg.textContent='✅ Word added to '+GRADES[grade].label+'.';
  document.getElementById('vwWord').value=''; document.getElementById('vwAr').value=''; document.getElementById('vwSentence').value='';
}

async function addVocabQuizQ(){
  const grade = document.getElementById('vqGrade').value;
  const q = document.getElementById('vqQ').value.trim();
  const opts = document.getElementById('vqOpts').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const correct = document.getElementById('vqCorrect').value.trim();
  const msg = document.getElementById('vqMsg');
  if(!q || opts.length<2 || !opts.includes(correct)){ msg.style.color='#c62828'; msg.textContent='Please add a question, at least 2 options, and a correct answer that matches one option exactly.'; return; }
  const list = await loadCustomVocabQuiz(grade); list.push({q,opts,correct}); await sSet('customVocabQuiz:'+grade, list, true);
  invalidateCache(grade);
  msg.style.color='#2e7d32'; msg.textContent='✅ Quiz question added to '+GRADES[grade].label+'.';
  document.getElementById('vqQ').value=''; document.getElementById('vqOpts').value=''; document.getElementById('vqCorrect').value='';
}

async function addPassage(){

  const list = await loadCustomReading(grade); list.push({type,title,passage,exercises:[]}); await sSet('customReading:'+grade, list, true);
  invalidateCache(grade);
  msg.style.color='#2e7d32'; msg.textContent='✅ Passage created. Now add questions to it below.';
  document.getElementById('rpTitle').value=''; document.getElementById('rpText').value='';
  document.getElementById('rqGrade').value = grade;
  await refreshPassageOptions();
}

async function addPassageQ(){
  const grade = document.getElementById('rqGrade').value;
  const pIdx = parseInt(document.getElementById('rqPassage').value, 10);
  const builtinCount = GRADES[grade].reading.length;
  const q = document.getElementById('rqQ').value.trim();
  const correct = document.getElementById('rqCorrect').value.trim();
  const optsRaw = document.getElementById('rqOpts').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const msg = document.getElementById('rqMsg');
  if(!q || !correct){ msg.style.color='#c62828'; msg.textContent='Please add a question and correct answer.'; return; }
  if(pIdx < builtinCount){ msg.style.color='#c62828'; msg.textContent='You can only add questions to passages you created (the ones added via "Add a Reading Passage").'; return; }
  const customIdx = pIdx - builtinCount;
  const list = await loadCustomReading(grade);
  const passage = list[customIdx];
  const opts = passage.type === 'tfng' ? ["TRUE","FALSE","NOT GIVEN"] : optsRaw;
  if(passage.type !== 'tfng' && (opts.length < 2 || !opts.includes(correct))){ msg.style.color='#c62828'; msg.textContent='For MCQ, add at least 2 options and a correct answer matching one exactly.'; return; }
  passage.exercises.push({q,opts,correct});
  await sSet('customReading:'+grade, list, true);
  invalidateCache(grade);
  msg.style.color='#2e7d32'; msg.textContent='✅ Question added to "'+passage.title+'".';
  document.getElementById('rqQ').value=''; document.getElementById('rqOpts').value=''; document.getElementById('rqCorrect').value='';
}

async function saveSheetUrl(){
  const url = document.getElementById('sheetUrl').value.trim();
  await sSet('sheetWebhookUrl', url, true);
  const msg = document.getElementById('sheetMsg');
  msg.style.color='#2e7d32'; msg.textContent = url ? '✅ Saved. Reports will now also be sent to your Google Sheet.' : '✅ Cleared — reports will only be stored in this page.';
}
async function testSheetUrl(){
  const url = document.getElementById('sheetUrl').value.trim();
  const msg = document.getElementById('sheetMsg');
  if(!url){ msg.style.color='#c62828'; msg.textContent = 'Paste your Apps Script URL first.'; return; }
  msg.style.color='#333'; msg.textContent = 'Sending a test row…';
  try{
    await fetch(url, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({student:'TEST STUDENT', grade:'Test', section:'Connection Test', topic:'Test row', score:1, total:1, pct:100, date:new Date().toISOString()})});
    msg.style.color='#2e7d32'; msg.textContent = '✅ Test row sent. Check your Google Sheet — a "TEST STUDENT" row should appear within a few seconds.';
  }catch(e){
    msg.style.color='#c62828'; msg.textContent = '❌ Could not reach that URL. Double-check it was deployed as a Web App with Access: Anyone.';
  }
}

async function saveCertFromForm(){
  const cs = {
    teacherName: document.getElementById('csTeacher').value,
    schoolName: document.getElementById('csSchool').value,
    principalName: document.getElementById('csPrincipal').value,
    title: document.getElementById('csTitle').value,

  document.getElementById('csOut').style.color='#2e7d32';

async function downloadCSV(){
  const reports = await loadReports();
  let csv = "Student,Grade,Section,Topic,Score,Total,Percent,Date\n";
  reports.forEach(r=>{ csv += `"${r.student}","${r.grade}","${r.section}","${r.topic}",${r.score},${r.total},${r.pct},"${new Date(r.date).toLocaleString()}"\n`; });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'eot3_revision_reports.csv'; a.click();
}
